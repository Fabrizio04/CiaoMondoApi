name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ] # La pipeline parte quando carichi su main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Serve per caricare l'immagine nel tuo registro GitHub

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Esecuzione Test
        run: dotnet test *.slnx --configuration Release

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push dell'immagine
        uses: docker/build-push-action@v5
        with:
          # Il contesto è la sottocartella CiaoMondoApi
          context: ./CiaoMondoApi
          # Il file si trova dentro quella cartella
          file: ./CiaoMondoApi/Dockerfile
          push: true
          # L'immagine si chiamerà ghcr.io/tuo-utente/ciaomondoapi:latest
          tags: ghcr.io/fabrizio04/ciaomondoapi:latest